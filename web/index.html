<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Luminous Homepage">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="theme-color" content="#EEF2F6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Luminous">
  
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">
  
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preload" href="main.dart.js" as="script">
  
  <title>Luminous</title>
  
  <script src="https://unpkg.com/sakana-widget@2.3.0/lib/sakana.min.js" defer crossorigin></script>
  
  <script>
    window._fetchImageUrl = async function(url) {
      try {
        const response = await fetch(url, {
          method: 'GET',
          mode: 'no-cors',
        });
        if (response.type === 'opaque') {
          return url;
        }
        return response.url || url;
      } catch (e) {
        console.error('Fetch image URL error:', e);
        return url;
      }
    };
  </script>
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #EEF2F6 0%, #D6E4F0 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    
    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    
    .loader {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(2, 83, 154, 0.2);
      border-top-color: #02539A;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 18px;
      color: #02539A;
      font-weight: 500;
      letter-spacing: 2px;
    }
    
    .loading-dots {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    
    .loading-dots span {
      width: 8px;
      height: 8px;
      background: #02539A;
      border-radius: 50%;
      animation: bounce 1.4s ease-in-out infinite both;
    }
    
    .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
    .loading-dots span:nth-child(3) { animation-delay: 0s; }
    
    @keyframes bounce {
      0%, 80%, 100% { 
        transform: scale(0);
        opacity: 0.5;
      }
      40% { 
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loader-container">
      <div class="loader"></div>
      <div class="loading-text">Loading</div>
      <div class="loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>
  
  <script>
    // Enhanced loading screen management for deferred loading
    window.addEventListener('load', function() {
      var loadingScreen = document.getElementById('loading-screen');
      var checkInterval = setInterval(function() {
        // Check for Flutter app initialization
        if (document.querySelector('flt-glass-pane') || 
            document.querySelector('flt-root-wrapper') ||
            document.body.classList.contains('flutter-loaded')) {
          clearInterval(checkInterval);
          loadingScreen.classList.add('fade-out');
          setTimeout(function() {
            loadingScreen.remove();
          }, 500);
        }
      }, 100);
      
      // Timeout fallback: remove loading screen after 10 seconds
      setTimeout(function() {
        if (loadingScreen && loadingScreen.parentNode) {
          loadingScreen.classList.add('fade-out');
          setTimeout(function() {
            loadingScreen.remove();
          }, 500);
        }
      }, 10000);
    });
  </script>
  
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
