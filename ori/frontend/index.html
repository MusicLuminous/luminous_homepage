<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">加载中...</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-dots"></div>

    <main class="container">
        <!-- 顶部信息栏 -->
        <div class="top-bar">
            <div class="datetime-box">
                <div class="greeting" id="greeting">你好</div>
                <div class="time" id="current-time">00:00</div>
                <div class="date" id="current-date">1月1日 星期一</div>
            </div>
            <div class="site-title-box">
                <h1 class="site-title" id="site-title">悠悠の小站</h1>
            </div>
            <div class="weather-box" id="weather-box">
                <span class="weather-icon">☀</span>
                <span class="weather-text">加载中...</span>
            </div>
        </div>

        <header class="hero-section">
            <p class="hitokoto" id="site-subtitle">加载中...</p>
        </header>

        <!-- 日程提醒 -->
        <section class="schedule-alert" id="schedule-alert" style="display: none;">
            <div class="alert-content">
                <span class="alert-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                </span>
                <span id="alert-text">正在加载...</span>
            </div>
        </section>

        <!-- 主要内容区 -->
        <div class="main-grid">
            <!-- 左侧：图片 + 外链 -->
            <div class="left-column">
                <div class="card gallery-card">
                    <div id="anime-img" class="api-image"></div>
                    <div class="image-info">
                        <button class="refresh-btn" onclick="refreshImage()" title="换一张">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <polyline points="1 20 1 14 7 14"></polyline>
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- 外链展示 -->
                <div class="card links-card">
                    <h3 class="card-small-title">快捷链接</h3>
                    <div class="links-grid" id="links-grid">
                        <!-- 动态加载 -->
                    </div>
                </div>
            </div>

            <!-- 右侧：个人简介 -->
            <div class="right-column">
                <div class="card intro-card">
                    <div class="avatar-wrapper">
                        <div class="avatar-ring"></div>
                        <img id="qq-avatar" src="" alt="头像" class="avatar">
                        <span id="qq-nickname" class="avatar-name">-</span>
                        <span id="qq-signature" class="avatar-signature">-</span>
                    </div>
                    <div class="card-content">
                        <p id="qq-bio"><span class="bio-label">简介</span> loading...</p>
                        <div class="tag-group" id="tag-group">
                            <!-- 动态加载 -->
                        </div>
                    </div>
                </div>

                <!-- 统计信息 -->
                <div class="card stats-card">
                    <h3 class="card-small-title">本站数据</h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-number" id="runtime-days">0</div>
                            <div class="stat-label">运行天数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number" id="activity-count">0</div>
                            <div class="stat-label">动态总数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number" id="course-count">0</div>
                            <div class="stat-label">本周课程</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 今日日程 -->
        <section class="schedule-section">
            <div class="section-header">
                <h2 class="section-title">今日安排</h2>
                <span class="section-badge" id="schedule-count">0 项</span>
            </div>
            <div class="schedule-list" id="schedule-list">
                <!-- 动态加载 -->
            </div>
        </section>

        <!-- 最近动态 -->
        <section class="activity-section">
            <h2 class="section-title">最近动态</h2>
            <div class="activity-list" id="activity-list">
                <!-- 动态加载 -->
            </div>
        </section>
    </main>

    <!-- Sakana 挂件 -->
    <div id="sakana-widget-container"></div>
    <div id="sakana-widget-left"></div>

    <script src="https://cdn.jsdelivr.net/npm/sakana-widget@2.3.0/lib/sakana.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
